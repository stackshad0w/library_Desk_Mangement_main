<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Swami Abhyasika</title>
<style>
  :root { --bg:#080a10; --bg2:#0f1219; --bg3:#161a24; --border:#242938; --text:#f5f6fa; --text3:#7b8296; --accent:#7c6fff; --accent2:#a59bff; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    width: 100%; max-width: 360px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { color: var(--text3); font-size: 13px; margin: 0 0 24px; }
  label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; font-weight: 600; }
  input {
    width: 100%; padding: 10px 12px; margin-bottom: 16px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; padding: 11px; background: var(--accent); color: white; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  button:hover { background: var(--accent2); }
  button:disabled { opacity: 0.6; cursor: default; }
  #err { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; display: none; }
</style>
<style id="swami-login-ui-refresh">
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap');
  :root { --accent:#23c483; --accent2:#7ee7b7; }
  body {
    position: relative; overflow: hidden; font-family:'DM Sans',sans-serif;
    background:
      radial-gradient(circle at 18% 18%, rgba(35,196,131,.16), transparent 28%),
      radial-gradient(circle at 82% 82%, rgba(245,158,11,.08), transparent 30%),
      #080a10;
  }
  body::before {
    content:''; position:fixed; inset:-30%; pointer-events:none;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:42px 42px; transform:rotate(-8deg);
  }
  .card {
    position:relative; max-width:390px; padding:38px 36px 34px;
    border-radius:24px; border:1px solid rgba(255,255,255,.10);
    background:linear-gradient(145deg,rgba(23,27,37,.94),rgba(12,14,21,.97));
    box-shadow:0 30px 90px rgba(0,0,0,.52),0 0 0 1px rgba(35,196,131,.03);
    backdrop-filter:blur(18px);
  }
  .card::before {
    content:''; display:block; width:70px; height:70px; margin:0 auto 18px;
    border-radius:20px; background:url('/assets/swami-abhyasika-logo.jpg') center/cover no-repeat;
    border:1px solid rgba(255,255,255,.12); box-shadow:0 12px 30px rgba(35,196,131,.20);
  }
  h1 { font-family:'Syne',sans-serif; text-align:center; font-size:24px; letter-spacing:-.03em; }
  p.sub { text-align:center; margin-bottom:28px; }
  label { color:#aab3c6; margin-bottom:8px; }
  input {
    min-height:46px; padding:12px 14px; margin-bottom:18px;
    background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.09); border-radius:11px;
    transition:border .18s,box-shadow .18s,background .18s;
  }
  input:hover { border-color:rgba(255,255,255,.17); }
  input:focus { background:#171b25; border-color:var(--accent); box-shadow:0 0 0 4px rgba(35,196,131,.11); }
  button {
    min-height:47px; border-radius:11px;
    background:linear-gradient(135deg,#18aa6d,#37d798);
    box-shadow:0 12px 28px rgba(35,196,131,.24); transition:transform .18s,box-shadow .18s,filter .18s;
  }
  button:hover { background:linear-gradient(135deg,#20b978,#43dfa1); transform:translateY(-1px); box-shadow:0 16px 34px rgba(35,196,131,.30); }
  #err { padding:10px 12px; border-radius:9px; background:rgba(255,107,107,.09); border:1px solid rgba(255,107,107,.18); }
  @media(max-width:480px){ .card{margin:16px;padding:30px 22px;}.card::before{width:62px;height:62px;} }
</style>

</head>
<body>
  <form class="card" id="login-form">
    <h1>Swami Abhyasika</h1>
    <p class="sub">Sign in to continue</p>
    <div id="err"></div>
    <label for="username">Username</label>
    <input type="text" id="username" autocomplete="username" required>
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit" id="submit-btn">Sign In</button>
  </form>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const errEl = document.getElementById('err');
      const btn = document.getElementById('submit-btn');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');
        localStorage.setItem('_auth_token', data.token);
        window.location.href = '/index.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
